# ─────────────────────────────────────────────────────────────
# Render Blueprint — AI Image World backend (Express API)
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push to GitHub, then "New + → Blueprint" in Render and point it at
# this repo. Fill in the secret env vars marked `sync: false` in the dashboard.
# ─────────────────────────────────────────────────────────────
services:
  - type: web
    name: ai-image-world-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ---- Secrets (set in the Render dashboard) ----
      - key: MONGO_URI
        sync: false # MongoDB Atlas connection string
      - key: JWT_ACCESS_SECRET
        generateValue: true # 32+ char random
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Comma-separated allowed client origins (your Vercel URL).
      - key: CLIENT_ORIGIN
        sync: false
      # Gemini (chatbot) — set the API key in the Render dashboard.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      # Initial superadmin (used by `npm run seed:admin` / seed:content).
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
